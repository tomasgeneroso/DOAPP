# ============================================
# DOAPP - CI/CD Pipeline for Hostinger VPS
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Lint & Type Check (solo server — mobile y client tienen errores conocidos)
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint (server)
        run: npx eslint server/routes server/middleware server/services --ext .ts --max-warnings 50 || true

      - name: TypeScript check (server only)
        run: npx tsc --noEmit --project tsconfig.server.json
        continue-on-error: true

      - name: Check for critical security issues
        run: |
          echo "🔍 Checking for hardcoded secrets..."
          # Require 20+ chars after sk- to avoid false positives (e.g. "task-claim" contains "sk-c")
          if grep -rn --include="*.ts" -E "sk-[a-zA-Z0-9]{20,}" server/ | grep -v "process\.env" | grep -v "\.env"; then
            echo "⚠️  Possible API key found in server code"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  # ============================================
  # Build
  # ============================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build:client
        env:
          VITE_API_URL: https://doapparg.site/api
          VITE_GOOGLE_ANALYTICS_ID: "${{ secrets.VITE_GOOGLE_ANALYTICS_ID }}"
          VITE_FIREBASE_API_KEY: "${{ secrets.VITE_FIREBASE_API_KEY }}"
          VITE_FIREBASE_AUTH_DOMAIN: "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}"
          VITE_FIREBASE_PROJECT_ID: "${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
          VITE_FIREBASE_STORAGE_BUCKET: "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}"
          VITE_FIREBASE_APP_ID: "${{ secrets.VITE_FIREBASE_APP_ID }}"
          VITE_FIREBASE_MEASUREMENT_ID: "${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}"

      - name: Verify build output
        run: |
          if [ ! -d "dist/public" ] && [ ! -d "dist" ]; then
            echo "❌ Build output not found"
            exit 1
          fi
          echo "✅ Build output verified"

  # ============================================
  # Deploy to Hostinger VPS
  # ============================================
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/doapp

            echo "📋 Current commit before deploy:"
            git rev-parse --short HEAD

            echo "📥 Pulling latest code..."
            git fetch origin && git reset --hard origin/master

            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps

            echo "🔨 Building frontend..."
            npm run build:client

            echo "🗄️  Running database migrations..."
            NODE_ENV=production npx sequelize-cli db:migrate
            echo "✅ Migrations completed"

            echo "🔄 Restarting application..."
            pm2 restart doapp || pm2 start ecosystem.config.cjs

            echo "⏳ Waiting for app to start..."
            sleep 15

            echo "📋 PM2 status:"
            pm2 status

            echo "📋 Server logs (last 30 lines):"
            pm2 logs doapp --lines 30 --nostream || true

            echo "🏥 Local health check:"
            curl -sf http://localhost:3001/api/health && echo "✅ Local OK" || echo "❌ Local health check failed"

            echo "✅ Deploy completed! New commit:"
            git rev-parse --short HEAD

      - name: Health Check
        run: |
          echo "⏳ Waiting for server to be ready..."
          sleep 20
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 https://doapparg.site/api/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Retry $i/5..."
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
