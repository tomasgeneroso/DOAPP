<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="iconbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1628"/>
      <stop offset="100%" style="stop-color:#070d1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background (no rounded corners — iOS clips automatically) -->
  <rect width="180" height="180" fill="url(#iconbg)"/>

  <!-- Glow -->
  <ellipse cx="90" cy="72" rx="80" ry="70" fill="url(#glow)"/>

  <!-- Circle -->
  <circle cx="90" cy="72" r="48" fill="#0ea5e9"/>

  <!-- DO text inside circle -->
  <text x="90" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">DO</text>

  <!-- APP text below circle -->
  <text x="90" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle" letter-spacing="5">APP</text>
</svg>
