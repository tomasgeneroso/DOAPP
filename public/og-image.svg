<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070d1a"/>
      <stop offset="100%" style="stop-color:#0c1628"/>
    </linearGradient>
    <radialGradient id="blob1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="85%" cy="75%" r="45%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="65%" cy="20%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Blobs -->
  <ellipse cx="240" cy="189" rx="380" ry="280" fill="url(#blob1)"/>
  <ellipse cx="1020" cy="472" rx="340" ry="260" fill="url(#blob2)"/>
  <ellipse cx="780" cy="126" rx="260" ry="200" fill="url(#blob3)"/>

  <!-- Logo circle -->
  <circle cx="600" cy="210" r="72" fill="#0ea5e9"/>
  <text x="600" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">DO</text>

  <!-- APP text next to logo -->
  <text x="600" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="64" font-weight="900" fill="white" text-anchor="middle" letter-spacing="8">APP</text>

  <!-- Divider line -->
  <line x1="440" y1="358" x2="760" y2="358" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="500" fill="#94a3b8" text-anchor="middle">Plataforma Freelance Argentina</text>
  <text x="600" y="452" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="500" fill="#94a3b8" text-anchor="middle">Pagos Seguros con Escrow</text>

  <!-- Badges row -->
  <!-- Badge 1 -->
  <rect x="268" y="502" width="200" height="44" rx="22" fill="#0ea5e920" stroke="#0ea5e940" stroke-width="1"/>
  <text x="368" y="529" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#38bdf8" text-anchor="middle">100% Argentino</text>

  <!-- Badge 2 -->
  <rect x="500" y="502" width="200" height="44" rx="22" fill="#f9731620" stroke="#f9731640" stroke-width="1"/>
  <text x="600" y="529" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#fb923c" text-anchor="middle">Pagos Escrow</text>

  <!-- Badge 3 -->
  <rect x="732" y="502" width="200" height="44" rx="22" fill="#0ea5e920" stroke="#0ea5e940" stroke-width="1"/>
  <text x="832" y="529" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#38bdf8" text-anchor="middle">Comisión desde 1%</text>

  <!-- URL bottom -->
  <text x="600" y="600" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#475569" text-anchor="middle">doapparg.site</text>
</svg>
